services:
  backend:
    build:
      context: ./backend
    container_name: coffeemania-backend
    env_file:
      - .env
    expose:
      - "8001"
    volumes:
      - ./backend/database.db:/app/database.db
    restart: unless-stopped

  frontend:
    build:
      context: ./coffeemania
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: coffeemania-frontend
    env_file:
      - .env
    expose:
      - "3002"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: coffeemania-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot-www:/var/www/certbot:ro
    depends_on:
      - frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: coffeemania-certbot
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
