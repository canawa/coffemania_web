upstream frontend {
    server frontend:3002;
}

# www → основной домен (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.coffeemaniavpn.ru;

    ssl_certificate /etc/letsencrypt/live/coffeemaniavpn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coffeemaniavpn.ru/privkey.pem;
    include /etc/nginx/ssl/options-ssl-nginx.conf;

    return 301 https://coffeemaniavpn.ru$request_uri;
}

# Основной сайт
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name coffeemaniavpn.ru;

    ssl_certificate /etc/letsencrypt/live/coffeemaniavpn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coffeemaniavpn.ru/privkey.pem;
    include /etc/nginx/ssl/options-ssl-nginx.conf;

    client_max_body_size 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

# HTTP: ACME challenge + редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name coffeemaniavpn.ru www.coffeemaniavpn.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://coffeemaniavpn.ru$request_uri;
    }
}
